name: Test Package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ["ubuntu-latest"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Hatch
        run: pipx install hatch
      - name: Print system info
        run: |
          echo "CC=$CC"
          echo "CXX=$CXX"
          echo "CFLAGS=$CFLAGS"
          echo "CXXFLAGS=$CXXFLAGS"
          echo "CPPFLAGS=$CPPFLAGS"
      - name: Run tests
        run: hatch test --all
